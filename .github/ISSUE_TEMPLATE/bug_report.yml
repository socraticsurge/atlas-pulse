name: Bug report
description: Something is broken or not working as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug, plus what you expected to happen instead.
      placeholder: When I click X, Y happens. I expected Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Feeds and articles (fetching, parsing, reading)
        - AI features (summaries, analysis, chat, batch)
        - Multi-article AI actions (compare, newsletter, briefing)
        - UI and appearance (themes, layout, settings)
        - Data (IndexedDB, SQLite library, OPML)
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, and Node.js version
      placeholder: macOS 15, Chrome 138, Node 22
    validations:
      required: true
  - type: input
    id: ollama
    attributes:
      label: Ollama version and model (AI issues only)
      placeholder: Ollama 0.9.x, qwen2.5:3b
  - type: textarea
    id: logs
    attributes:
      label: Console or terminal output
      description: Errors from the browser console or the terminal running `npm run dev`.
      render: shell
