<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00aee0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00aee0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#00d4aa" stroke-width="6" stroke-opacity="0.2"/>

  <!-- Pulse waveform -->
  <path
    d="M 48 256 L 138 256 L 190 96 L 242 380 L 282 172 L 324 256 L 464 256"
    stroke="url(#wave)"
    stroke-width="28"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Live dot -->
  <circle cx="324" cy="256" r="26" fill="#00d4aa"/>
  <circle cx="324" cy="256" r="48" fill="#00d4aa" fill-opacity="0.18"/>

  <!-- App name -->
  <text
    x="256" y="450"
    text-anchor="middle"
    font-family="Inter, -apple-system, sans-serif"
    font-weight="700"
    font-size="68"
    letter-spacing="8"
    fill="url(#textGrad)"
    fill-opacity="0.85"
  >ATLAS PULSE</text>
</svg>
