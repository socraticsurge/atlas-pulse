<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.25"/>
      <stop offset="45%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00aee0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- Pulse waveform -->
  <path
    d="M 9 50 L 27 50 L 37 19 L 47 74 L 55 34 L 63 50 L 91 50"
    stroke="url(#wave)"
    stroke-width="5.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Live dot — the pulse moment -->
  <circle cx="63" cy="50" r="5" fill="#00d4aa"/>
  <circle cx="63" cy="50" r="9.5" fill="#00d4aa" fill-opacity="0.18"/>
</svg>
